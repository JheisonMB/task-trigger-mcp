name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Validate tag is from main branch
        run: |
          # Verificar que el tag existe en main
          if ! git merge-base --is-ancestor ${{ github.ref_name }} origin/main; then
            echo "❌ Error: Tag ${{ github.ref_name }} no se encuentra en la rama main"
            echo "El release solo puede hacerse desde main para evitar accidentes"
            exit 1
          fi
          echo "✅ Tag validado en rama main"

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d '\r')
          echo "Versión en Cargo.toml: $CARGO_VERSION"
          echo "Versión del tag: ${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "❌ Error: La versión en Cargo.toml ($CARGO_VERSION) no coincide con el tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✅ Versión validada correctamente"
  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../task-trigger-mcp-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.tar.gz task-trigger-mcp
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path task-trigger-mcp.exe -DestinationPath ../../../task-trigger-mcp-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.zip
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-trigger-mcp-${{ matrix.target }}
          path: task-trigger-mcp-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  approve:
    name: Awaiting Manual Approval
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approval granted
        run: |
          echo "✅ Release approved for publishing to crates.io"

  publish:
    name: Publish to crates.io
    needs: [release, approve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo publish
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
